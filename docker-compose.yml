version: "3.8"
services:
  db:
    image: mysql:8.0
    container_name: hackathon_news_db
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  sign_db:
    image: mysql:8.0
    container_name: sign_language_db
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${SIGN_DB_PASSWORD}
      MYSQL_DATABASE: ${SIGN_DB_NAME}
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build: .
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      sign_db:
        condition: service_healthy
    restart: on-failure

volumes:
  mysql_data: